name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - os: macos-latest  # Apple Silicon
            target: aarch64-apple-darwin
          - os: macos-13      # Intel (last Intel runner)
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: homebrew-llvm20-${{ matrix.target }}

      - name: Install LLVM 20
        env:
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew install llvm@20
          brew link --force --overwrite llvm@20
          echo "LLVM_SYS_201_PREFIX=$(brew --prefix llvm@20)" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bootstrap/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-llvm20-${{ hashFiles('bootstrap/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-llvm20-

      - name: Build release binary
        working-directory: bootstrap
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          BINARY=bootstrap/target/${{ matrix.target }}/release/cronyxc
          ARCHIVE=cronyxc-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar -czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          shasum -a 256 "$ARCHIVE" | awk '{print $1}' > "$ARCHIVE.sha256"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: cronyxc-${{ matrix.target }}
          path: |
            cronyxc-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            cronyxc-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

  build-windows:
    name: Build (x86_64-pc-windows-msvc)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Cache LLVM 20 (Windows)
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: C:\LLVM
          key: llvm-20.1.8-windows-v2

      - name: Install LLVM 20 (Windows)
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.8/LLVM-20.1.8-win64.exe"
          $installer = "$env:TEMP\LLVM-20.1.8-win64.exe"
          Write-Host "Downloading LLVM 20.1.8..."
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Running silent install to C:\LLVM..."
          Start-Process $installer -ArgumentList "/S", "/D=C:\LLVM" -Wait
          if (-not (Test-Path "C:\LLVM\bin\llvm-config.exe")) {
            throw "llvm-config.exe not found at C:\LLVM\bin\llvm-config.exe"
          }
          Write-Host "LLVM ready at C:\LLVM"

      - name: Set LLVM env (Windows)
        shell: pwsh
        run: |
          "LLVM_SYS_201_PREFIX=C:\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bootstrap/target
          key: windows-x86_64-pc-windows-msvc-cargo-llvm20-${{ hashFiles('bootstrap/Cargo.lock') }}
          restore-keys: windows-x86_64-pc-windows-msvc-cargo-llvm20-

      - name: Build release binary
        working-directory: bootstrap
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package binary
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $archive = "cronyxc-$version-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path "bootstrap/target/x86_64-pc-windows-msvc/release/cronyxc.exe" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$archive.sha256" -Value $hash

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: cronyxc-x86_64-pc-windows-msvc
          path: |
            cronyxc-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
            cronyxc-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip.sha256

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums.txt
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: cronyxc ${{ github.ref_name }}
          body: |
            ## Install

            Download the binary for your platform from the assets below and place it on your `$PATH`.

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `cronyxc-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |
            | macOS (Intel) | `cronyxc-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` |
            | Windows (x64) | `cronyxc-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip` |

          files: artifacts/*
          fail_on_unmatched_files: true

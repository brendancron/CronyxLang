name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest  # Apple Silicon
            target: aarch64-apple-darwin
          - os: macos-13      # Intel (last Intel runner)
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          brew install llvm@20
          echo "LLVM_SYS_201_PREFIX=$(brew --prefix llvm@20)" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_comp/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-llvm20-${{ hashFiles('rust_comp/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-llvm20-

      - name: Build release binary
        working-directory: rust_comp
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          BINARY=rust_comp/target/${{ matrix.target }}/release/cronyxc
          ARCHIVE=cronyxc-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar -czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          shasum -a 256 "$ARCHIVE" | awk '{print $1}' > "$ARCHIVE.sha256"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: cronyxc-${{ matrix.target }}
          path: |
            cronyxc-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            cronyxc-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

  build-windows:
    name: Build (x86_64-pc-windows-msvc)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 (Windows)
        shell: pwsh
        run: |
          # Find the latest LLVM 20.x release that actually ships a win64.exe asset
          # (not all patch releases include pre-built Windows binaries)
          $releases = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/llvm/llvm-project/releases?per_page=50" `
            -UseBasicParsing
          $rel = $releases | Where-Object {
            $_.tag_name -match '^llvmorg-20\.' -and
            -not $_.prerelease -and
            ($_.assets | Where-Object { $_.name -match '^LLVM-.*-win64\.exe$' })
          } | Select-Object -First 1
          if (-not $rel) { throw "No LLVM 20.x release with a win64.exe asset found" }
          $asset = $rel.assets | Where-Object { $_.name -match '^LLVM-.*-win64\.exe$' } | Select-Object -First 1
          Write-Host "Found: $($rel.tag_name) — $($asset.name)"
          $installer = "$env:RUNNER_TEMP\llvm-installer.exe"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $installer -UseBasicParsing
          $proc = Start-Process -FilePath $installer -ArgumentList "/quiet" -PassThru -Wait
          if ($proc.ExitCode -ne 0) { throw "LLVM installer exited with code $($proc.ExitCode)" }
          $prefix = "C:\Program Files\LLVM"
          if (-not (Test-Path "$prefix\bin\llvm-config.exe")) { throw "llvm-config.exe not found after install" }
          Write-Host "LLVM installed at $prefix"
          "LLVM_SYS_201_PREFIX=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_comp/target
          key: windows-x86_64-pc-windows-msvc-cargo-llvm20-${{ hashFiles('rust_comp/Cargo.lock') }}
          restore-keys: windows-x86_64-pc-windows-msvc-cargo-llvm20-

      - name: Build release binary
        working-directory: rust_comp
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package binary
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $archive = "cronyxc-$version-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path "rust_comp/target/x86_64-pc-windows-msvc/release/cronyxc.exe" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$archive.sha256" -Value $hash

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: cronyxc-x86_64-pc-windows-msvc
          path: |
            cronyxc-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
            cronyxc-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip.sha256

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums.txt
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: cronyxc ${{ github.ref_name }}
          body: |
            ## Install

            Download the binary for your platform from the assets below and place it on your `$PATH`.

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `cronyxc-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |
            | macOS (Intel) | `cronyxc-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` |
            | Windows (x64) | `cronyxc-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip` |

          files: artifacts/*
          fail_on_unmatched_files: true

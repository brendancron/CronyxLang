name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust_comp

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_comp/target
          key: ${{ runner.os }}-cargo-llvm20-${{ hashFiles('rust_comp/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-llvm20-

      - name: Build
        run: cargo build
        env:
          LLVM_SYS_201_PREFIX: ${{ env.LLVM_PATH }}

      - name: Test
        run: RUSTFLAGS="-A warnings" cargo test
        env:
          LLVM_SYS_201_PREFIX: ${{ env.LLVM_PATH }}

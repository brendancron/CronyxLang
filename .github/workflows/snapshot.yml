name: Snapshot

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  version:
    name: Compute snapshot version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute snapshot version
        id: compute
        run: |
          # Latest clean release tag
          LATEST=$(git tag --list 'v*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1)
          LATEST="${LATEST:-v0.0.0}"

          # Sanitize branch: lowercase, non-alnum → hyphen, collapse runs, strip edges, cap at 40 chars
          BRANCH="${{ github.head_ref }}"
          SANITIZED=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//; s/-$//' \
            | cut -c1-40)

          VERSION="${LATEST}-snapshot-${SANITIZED}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Snapshot version: $VERSION"

  build-macos:
    name: Snapshot (${{ matrix.target }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          brew install llvm@20
          echo "LLVM_SYS_201_PREFIX=$(brew --prefix llvm@20)" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_comp/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-llvm20-${{ hashFiles('rust_comp/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-llvm20-

      - name: Build
        working-directory: rust_comp
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          BINARY=rust_comp/target/${{ matrix.target }}/release/cronyxc
          tar -czf "cronyxc-${VERSION}-${{ matrix.target }}.tar.gz" \
            -C "$(dirname $BINARY)" "$(basename $BINARY)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cronyxc-${{ matrix.target }}
          path: cronyxc-${{ needs.version.outputs.version }}-${{ matrix.target }}.tar.gz
          retention-days: 14

  build-windows:
    name: Snapshot (x86_64-pc-windows-msvc)
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 (Windows)
        shell: pwsh
        run: |
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/llvm/llvm-project/releases?per_page=50" -UseBasicParsing
          $rel = $releases | Where-Object { $_.tag_name -match '^llvmorg-20\.' } | Select-Object -First 1
          $version = $rel.tag_name -replace 'llvmorg-', ''
          $installer = "$env:RUNNER_TEMP\llvm-installer.exe"
          Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-${version}/LLVM-${version}-win64.exe" -OutFile $installer -UseBasicParsing
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait
          "LLVM_SYS_201_PREFIX=C:\Program Files\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_comp/target
          key: windows-x86_64-pc-windows-msvc-cargo-llvm20-${{ hashFiles('rust_comp/Cargo.lock') }}
          restore-keys: windows-x86_64-pc-windows-msvc-cargo-llvm20-

      - name: Build
        working-directory: rust_comp
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          Compress-Archive `
            -Path "rust_comp/target/x86_64-pc-windows-msvc/release/cronyxc.exe" `
            -DestinationPath "cronyxc-${version}-x86_64-pc-windows-msvc.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cronyxc-x86_64-pc-windows-msvc
          path: cronyxc-${{ needs.version.outputs.version }}-x86_64-pc-windows-msvc.zip
          retention-days: 14
